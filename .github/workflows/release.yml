name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build
        run: ./gradlew build

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          name: Persona ${{ github.ref_name }}
          files: build/libs/persona-*.jar
          generate_release_notes: true
          body: |
            **Persona ${{ github.ref_name }}** is a client side Fabric mod that locally changes your
            Minecraft name, skin and cape, or fully impersonates another player. Everything is a
            local illusion: only you see it.

            ## Requirements
            - Minecraft **1.21.11**
            - [Fabric Loader](https://fabricmc.net/use/installer/)
            - [Fabric API](https://modrinth.com/mod/fabric-api) for 1.21.11

            ## Install
            1. Download `persona-*.jar` below.
            2. Put it, together with Fabric API, into your `.minecraft/mods` folder.
            3. Launch the game and press **Right Shift** to open the menu.

            ## Highlights
            - Two modes: **Custom** (name, skin and cape separately) and **Impersonate** (take a
              player's whole identity in one field).
            - Name override on nametag, tab list and chat.
            - Searchable list of 36 bundled official capes.
            - Live rotatable 3D preview.

            > Local only. Other players never see your Persona look; the server owns that data.

            See the [README](https://github.com/Miro-sh/Persona#readme) for full details.
