# Gradle
org.gradle.jvmargs=-Xmx2G
org.gradle.parallel=true

# Fabric / Minecraft
# NOTE: 26.2 is the newest launcher build but Mojang ships NO mappings for it yet
# (no client_mappings, and no Yarn) -> not moddable. 1.21.11 is the newest stable
# version with full Yarn mappings + Fabric API support.
minecraft_version=1.21.11
yarn_mappings=1.21.11+build.6
loader_version=0.19.3
fabric_version=0.141.4+1.21.11

# Mod
mod_version=1.1.0
maven_group=com.persona
archives_base_name=persona
